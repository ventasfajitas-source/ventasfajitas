<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ventas - Emprendimiento</title>
    <style>
        :root {
            --primary-color: #25d366;
            --danger-color: #ff4d4d;
            --bg-color: #f4f4f9;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: var(--bg-color); color: #333; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #eee; }
        
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(37, 211, 102, 0.2); }
        
        label { font-size: 14px; font-weight: bold; display: block; margin-top: 10px; color: #666; }
        
        button { background: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s ease; }
        button:hover { background: #1ebe57; }
        button:active { transform: scale(0.98); }

        .btn-whatsapp { background: #128C7E; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        button.delete-all { background: transparent; color: #999; margin-top: 40px; font-size: 13px; border: 1px dashed #ccc; }
        button.delete-all:hover { background: #fff1f1; color: var(--danger-color); border-color: var(--danger-color); }

        .btn-borrar-uno { background: #fee; width: 32px; height: 32px; padding: 0; border-radius: 8px; color: var(--danger-color); font-size: 14px; border: 1px solid #fcc; }
        .btn-borrar-uno:hover { background: var(--danger-color); color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; background: #fff; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; }
        
        h2 { text-align: center; color: #222; margin-bottom: 25px; }
        h3 { margin-top: 0; color: #128C7E; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .fecha-grupo { background: #fafafa; font-weight: bold; color: #777; font-size: 12px; }
        .total-fila { background: #f9f9f9; font-weight: bold; color: #000; font-size: 15px; }
        .col-accion { text-align: center; width: 45px; }
        .total-monto { color: #2c3e50; font-weight: 800; }
    </style>
</head>
<body>

    <h2>🚀 Registro de Ventas</h2>
    
    <div class="card">
        <label for="fechaVenta">Fecha de Venta:</label>
        <input type="date" id="fechaVenta">

        <label for="cliente">Nombre del Cliente:</label>
        <input type="text" id="cliente" placeholder="Ej: Juan Pérez" autocomplete="off">
        
        <label for="producto">Producto:</label>
        <select id="producto">
            <option value="Fajita">🌯 Fajita ($2.500)</option>
            <option value="Alfajor">🍩 Alfajor ($1.000)</option>
            <option value="Torta">🍰 Torta ($2.500)</option>
            <option value="Kuchen">🥧 Kuchen ($2.500)</option>
        </select>
        
        <label for="cantidad">Cantidad:</label>
        <input type="number" id="cantidad" value="1" min="1">
        
        <button onclick="agregarVenta()">➕ Registrar Venta</button>
    </div>

    <div id="listado"></div>

    <button class="delete-all" onclick="borrarTodo()">⚠️ Borrar historial completo</button>

   <!DOCTYPE html>
<html lang="es">
<head>
    </head>
<body>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

       
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ventasRef = collection(db, "ventas");

        
        const productosConfig = {
            "Fajita": { precio: 2500, icono: "🌯" },
            "Alfajor": { precio: 1000, icono: "🍩" },
            "Torta": { precio: 2500, icono: "🍰" },
            "Kuchen": { precio: 2500, icono: "🥧" }
        };

        
        window.agregarVenta = async () => {
            const cliente = document.getElementById('cliente').value;
            const productoKey = document.getElementById('producto').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const fechaInput = document.getElementById('fechaVenta').value;

            if (!cliente.trim()) { alert("Ingresa un cliente"); return; }

            try {
               
                await addDoc(ventasRef, {
                    cliente: cliente,
                    producto: productoKey,
                    icono: productosConfig[productoKey].icono,
                    cantidad: cantidad,
                    total: productosConfig[productoKey].precio * cantidad,
                    fecha: fechaInput,
                    timestamp: Date.now() 
                document.getElementById('cliente').value = "";
            } catch (e) {
                console.error("Error al guardar: ", e);
            }
        };

       
        window.borrarVentaIndividual = async (id) => {
            if(confirm("¿Eliminar este registro?")) {
                await deleteDoc(doc(db, "ventas", id));
            }
        };

        const q = query(ventasRef, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const ventasNube = [];
            snapshot.forEach((doc) => {
                ventasNube.push({ id: doc.id, ...doc.data() });
            });
            renderizar(ventasNube); 
        });

      
        function renderizar(ventasData) {
            const contenedor = document.getElementById('listado');
            contenedor.innerHTML = "";
            
            if (ventasData.length === 0) {
                contenedor.innerHTML = "<p style='text-align:center;'>Sin ventas.</p>";
                return;
            }

      
        }
    </script>
</body>
</html>
